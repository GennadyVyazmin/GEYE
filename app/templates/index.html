<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GEYE Video Analytics</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="video-card">
        <h1>Видеоаналитика зала</h1>
        <img id="video_img" class="video" src="/video_feed" alt="Live feed" />
        <p id="video_mode" class="muted">Режим видео: stream</p>
      </section>

      <section class="stats-card">
        <h2>Статистика</h2>
        <button id="reset_btn" class="reset-btn" type="button">
          Сбросить счетчики и треки
        </button>
        <div class="stats-grid">
          <div class="stat">
            <span class="label">Сейчас в кадре</span>
            <span id="online_count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Уникальных за час</span>
            <span id="unique_hour" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Уникальных за 24 часа</span>
            <span id="unique_day" class="value">0</span>
          </div>
        </div>
        <p class="muted">
          Активные ID: <span id="global_ids">-</span>
        </p>
      </section>
    </main>

    <script>
      const videoImg = document.getElementById("video_img");
      const videoMode = document.getElementById("video_mode");
      let snapshotTimer = null;
      let switchedToSnapshot = false;

      function startSnapshotFallback() {
        if (switchedToSnapshot) return;
        switchedToSnapshot = true;
        videoMode.textContent = "Режим видео: snapshot fallback";
        if (snapshotTimer) clearInterval(snapshotTimer);
        snapshotTimer = setInterval(() => {
          videoImg.src = "/frame.jpg?t=" + Date.now();
        }, 120);
      }

      videoImg.addEventListener("error", startSnapshotFallback);

      // If stream doesn't render in a few seconds (typical Firefox issue), fallback.
      setTimeout(() => {
        if (videoImg.naturalWidth === 0 || videoImg.naturalHeight === 0) {
          startSnapshotFallback();
        }
      }, 5000);

      async function refreshStats() {
        try {
          const res = await fetch("/api/stats");
          if (!res.ok) return;
          const data = await res.json();
          document.getElementById("online_count").textContent = data.online_count;
          document.getElementById("unique_hour").textContent = data.unique_last_hour;
          document.getElementById("unique_day").textContent = data.unique_last_24h;
          document.getElementById("global_ids").textContent =
            data.online_global_ids.length > 0 ? data.online_global_ids.join(", ") : "-";
        } catch (_e) {
          // ignore network jitter
        }
      }
      setInterval(refreshStats, 2000);
      refreshStats();

      document.getElementById("reset_btn").addEventListener("click", async () => {
        const ok = window.confirm(
          "Сбросить счетчики, активные треки и очистить события в базе?"
        );
        if (!ok) return;
        try {
          const res = await fetch("/api/reset", { method: "POST" });
          if (!res.ok) {
            alert("Ошибка сброса");
            return;
          }
          await refreshStats();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });
    </script>
  </body>
</html>
