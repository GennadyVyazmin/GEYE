<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GEYE Video Analytics</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="layout">
      <section class="video-card">
        <h1>Видеоаналитика зала</h1>
        <img id="video_img" class="video" src="/video_feed" alt="Live feed" />
        <p id="video_mode" class="muted">Режим видео: stream</p>
      </section>

      <section class="stats-card">
        <h2>Статистика</h2>
        <div class="threshold-panel">
          <div class="threshold-row">
            <label for="threshold_range">Порог ReID</label>
            <span id="threshold_current" class="muted">текущее: -</span>
          </div>
          <input
            id="threshold_range"
            type="range"
            min="0.50"
            max="0.95"
            step="0.01"
            value="0.72"
          />
          <div class="threshold-row">
            <input
              id="threshold_input"
              type="number"
              min="0.50"
              max="0.95"
              step="0.01"
              value="0.72"
            />
            <button id="threshold_apply" class="secondary-btn" type="button">
              Применить
            </button>
          </div>

          <div class="threshold-row">
            <label for="confirm_age_range">Подтверждение трека (сек)</label>
            <span id="confirm_age_current" class="muted">текущее: -</span>
          </div>
          <input
            id="confirm_age_range"
            type="range"
            min="0.0"
            max="5.0"
            step="0.1"
            value="1.5"
          />
          <div class="threshold-row">
            <input
              id="confirm_age_input"
              type="number"
              min="0.0"
              max="5.0"
              step="0.1"
              value="1.5"
            />
            <button id="confirm_age_apply" class="secondary-btn" type="button">
              Применить
            </button>
          </div>
        </div>
        <button id="reset_btn" class="reset-btn" type="button">
          Сбросить счетчики и треки
        </button>
        <button id="reset_all_btn" class="reset-all-btn" type="button">
          Полный сброс (все базы + G-ID с 1)
        </button>
        <div class="stats-grid">
          <div class="stat">
            <span class="label">Сейчас в кадре</span>
            <span id="online_count" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Уникальных за час</span>
            <span id="unique_hour" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Уникальных за 24 часа</span>
            <span id="unique_day" class="value">0</span>
          </div>
        </div>
        <p class="muted">
          Активные ID: <span id="global_ids">-</span>
        </p>

        <h2>Фото уникальных</h2>
        <div class="gallery-tabs">
          <button class="tab-btn active" data-window="online" type="button">В кадре</button>
          <button class="tab-btn" data-window="hour" type="button">За час</button>
          <button class="tab-btn" data-window="day" type="button">За 24 часа</button>
        </div>
        <p id="gallery_info" class="muted">Загрузка...</p>
        <div id="gallery_grid" class="gallery-grid"></div>
      </section>
    </main>

    <div id="register_modal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modal_title">Регистрация человека</h3>
          <button id="modal_close" class="icon-btn" type="button">x</button>
        </div>
        <div class="modal-body">
          <img id="modal_photo" class="modal-photo" alt="person" />
          <label for="modal_name">Имя / метка</label>
          <input id="modal_name" type="text" placeholder="Например: Иван Петров" />
          <label for="modal_note">Комментарий</label>
          <textarea id="modal_note" rows="3" placeholder="Доп. информация"></textarea>
        </div>
        <div class="modal-actions">
          <button id="modal_save" class="secondary-btn" type="button">Сохранить</button>
        </div>
      </div>
    </div>

    <script>
      const videoImg = document.getElementById("video_img");
      const videoMode = document.getElementById("video_mode");
      const thresholdRange = document.getElementById("threshold_range");
      const thresholdInput = document.getElementById("threshold_input");
      const thresholdCurrent = document.getElementById("threshold_current");
      const confirmAgeRange = document.getElementById("confirm_age_range");
      const confirmAgeInput = document.getElementById("confirm_age_input");
      const confirmAgeCurrent = document.getElementById("confirm_age_current");
      const galleryGrid = document.getElementById("gallery_grid");
      const galleryInfo = document.getElementById("gallery_info");
      const galleryTabs = Array.from(document.querySelectorAll(".tab-btn"));
      const modal = document.getElementById("register_modal");
      const modalClose = document.getElementById("modal_close");
      const modalSave = document.getElementById("modal_save");
      const modalTitle = document.getElementById("modal_title");
      const modalPhoto = document.getElementById("modal_photo");
      const modalName = document.getElementById("modal_name");
      const modalNote = document.getElementById("modal_note");
      let selectedGlobalId = null;
      let currentGalleryWindow = "online";
      let snapshotTimer = null;
      let switchedToSnapshot = false;

      function startSnapshotFallback() {
        if (switchedToSnapshot) return;
        switchedToSnapshot = true;
        videoMode.textContent = "Режим видео: snapshot fallback";
        if (snapshotTimer) clearInterval(snapshotTimer);
        snapshotTimer = setInterval(() => {
          videoImg.src = "/frame.jpg?t=" + Date.now();
        }, 120);
      }

      videoImg.addEventListener("error", startSnapshotFallback);

      // If stream doesn't render in a few seconds (typical Firefox issue), fallback.
      setTimeout(() => {
        if (videoImg.naturalWidth === 0 || videoImg.naturalHeight === 0) {
          startSnapshotFallback();
        }
      }, 5000);

      async function refreshStats() {
        try {
          const res = await fetch("/api/stats");
          if (!res.ok) return;
          const data = await res.json();
          document.getElementById("online_count").textContent = data.online_count;
          document.getElementById("unique_hour").textContent = data.unique_last_hour;
          document.getElementById("unique_day").textContent = data.unique_last_24h;
          document.getElementById("global_ids").textContent =
            data.online_global_ids.length > 0 ? data.online_global_ids.join(", ") : "-";
        } catch (_e) {
          // ignore network jitter
        }
      }
      setInterval(refreshStats, 2000);
      refreshStats();

      function renderGallery(items) {
        if (!items || items.length === 0) {
          galleryGrid.innerHTML = '<div class="muted">Нет данных для этого окна</div>';
          return;
        }
        galleryGrid.innerHTML = items
          .map((item) => {
            if (item.image_url) {
              return `
                <article class="person-card ${item.registered ? "registered" : ""}" data-gid="${item.global_id}" data-image="${item.image_url}">
                  <img src="${item.image_url}" alt="G${item.global_id}" loading="lazy" />
                  <div class="person-meta">G${item.global_id} ${item.display_name ? "• " + item.display_name : ""}</div>
                </article>
              `;
            }
            return `
              <article class="person-card no-photo ${item.registered ? "registered" : ""}" data-gid="${item.global_id}" data-image="">
                <div class="no-photo-text">Нет фото анфас</div>
                <div class="person-meta">G${item.global_id} ${item.display_name ? "• " + item.display_name : ""}</div>
              </article>
            `;
          })
          .join("");
      }

      function openRegisterModal(globalId, imageUrl) {
        selectedGlobalId = globalId;
        modalTitle.textContent = "Регистрация G" + globalId;
        modalPhoto.src = imageUrl || "";
        modalPhoto.style.display = imageUrl ? "block" : "none";
        modalName.value = "";
        modalNote.value = "";
        modal.classList.remove("hidden");

        fetch("/api/people/" + globalId)
          .then((r) => (r.ok ? r.json() : null))
          .then((data) => {
            if (!data || !data.registered) return;
            modalName.value = data.display_name || "";
            modalNote.value = data.note || "";
          })
          .catch(() => {});
      }

      function closeRegisterModal() {
        modal.classList.add("hidden");
        selectedGlobalId = null;
      }

      galleryGrid.addEventListener("click", (e) => {
        const card = e.target.closest(".person-card");
        if (!card) return;
        const gid = Number(card.dataset.gid);
        if (Number.isNaN(gid)) return;
        openRegisterModal(gid, card.dataset.image || "");
      });

      modalClose.addEventListener("click", closeRegisterModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeRegisterModal();
      });
      modalSave.addEventListener("click", async () => {
        if (selectedGlobalId === null) return;
        const displayName = modalName.value.trim();
        if (!displayName) {
          alert("Введите имя/метку");
          return;
        }
        try {
          const res = await fetch("/api/people/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              global_id: selectedGlobalId,
              display_name: displayName,
              note: modalNote.value.trim(),
            }),
          });
          if (!res.ok) {
            alert("Не удалось сохранить");
            return;
          }
          closeRegisterModal();
          await refreshGallery();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });

      async function refreshGallery() {
        try {
          const res = await fetch("/api/gallery?window=" + currentGalleryWindow);
          if (!res.ok) return;
          const data = await res.json();
          galleryInfo.textContent = `Людей: ${data.count}`;
          renderGallery(data.items);
        } catch (_e) {
          galleryInfo.textContent = "Ошибка загрузки галереи";
        }
      }

      galleryTabs.forEach((btn) => {
        btn.addEventListener("click", async () => {
          galleryTabs.forEach((x) => x.classList.remove("active"));
          btn.classList.add("active");
          currentGalleryWindow = btn.dataset.window;
          await refreshGallery();
        });
      });
      setInterval(refreshGallery, 5000);
      refreshGallery();

      async function loadThreshold() {
        try {
          const res = await fetch("/api/reid");
          if (!res.ok) return;
          const data = await res.json();
          const v = Number(data.match_threshold).toFixed(2);
          thresholdRange.value = v;
          thresholdInput.value = v;
          thresholdCurrent.textContent = "текущее: " + v;
        } catch (_e) {
          // ignore
        }
      }

      async function loadConfirmAge() {
        try {
          const res = await fetch("/api/confirm-age");
          if (!res.ok) return;
          const data = await res.json();
          const v = Number(data.min_age_sec).toFixed(1);
          confirmAgeRange.value = v;
          confirmAgeInput.value = v;
          confirmAgeCurrent.textContent = "текущее: " + v;
        } catch (_e) {
          // ignore
        }
      }

      thresholdRange.addEventListener("input", () => {
        thresholdInput.value = thresholdRange.value;
      });

      thresholdInput.addEventListener("input", () => {
        const v = Number(thresholdInput.value);
        if (!Number.isNaN(v)) {
          thresholdRange.value = String(v);
        }
      });
      confirmAgeRange.addEventListener("input", () => {
        confirmAgeInput.value = confirmAgeRange.value;
      });
      confirmAgeInput.addEventListener("input", () => {
        const v = Number(confirmAgeInput.value);
        if (!Number.isNaN(v)) {
          confirmAgeRange.value = String(v);
        }
      });

      document.getElementById("threshold_apply").addEventListener("click", async () => {
        const value = Number(thresholdInput.value);
        if (Number.isNaN(value) || value < 0.5 || value > 0.95) {
          alert("Введите значение от 0.50 до 0.95");
          return;
        }
        try {
          const res = await fetch("/api/reid", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ match_threshold: value }),
          });
          if (!res.ok) {
            alert("Не удалось применить порог");
            return;
          }
          await loadThreshold();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });
      document.getElementById("confirm_age_apply").addEventListener("click", async () => {
        const value = Number(confirmAgeInput.value);
        if (Number.isNaN(value) || value < 0.0 || value > 5.0) {
          alert("Введите значение от 0.0 до 5.0");
          return;
        }
        try {
          const res = await fetch("/api/confirm-age", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ min_age_sec: value }),
          });
          if (!res.ok) {
            alert("Не удалось применить время подтверждения");
            return;
          }
          await loadConfirmAge();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });

      loadThreshold();
      loadConfirmAge();

      document.getElementById("reset_btn").addEventListener("click", async () => {
        const ok = window.confirm(
          "Сбросить счетчики, активные треки и очистить события в базе?"
        );
        if (!ok) return;
        try {
          const res = await fetch("/api/reset", { method: "POST" });
          if (!res.ok) {
            alert("Ошибка сброса");
            return;
          }
          await refreshStats();
          await refreshGallery();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });
      document.getElementById("reset_all_btn").addEventListener("click", async () => {
        const ok = window.confirm(
          "Полный сброс удалит события, фото, регистрацию людей и начнет G-ID снова с 1. Продолжить?"
        );
        if (!ok) return;
        const ok2 = window.confirm("Подтвердите полный сброс еще раз.");
        if (!ok2) return;
        try {
          const res = await fetch("/api/reset-all", { method: "POST" });
          if (!res.ok) {
            alert("Ошибка полного сброса");
            return;
          }
          await refreshStats();
          await refreshGallery();
        } catch (_e) {
          alert("Сервер недоступен");
        }
      });
    </script>
  </body>
</html>
